<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L.U.N.A. - Acceso de Seguridad</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='%23ffffff' stroke='%23e2e8f0' stroke-width='1'/><circle cx='34' cy='34' r='7' fill='%23cbd5e1' opacity='0.6'/><circle cx='66' cy='44' r='10' fill='%2394a3b8' opacity='0.4'/><circle cx='44' cy='66' r='8' fill='%23cbd5e1' opacity='0.6'/><circle cx='64' cy='66' r='6' fill='%2394a3b8' opacity='0.5'/></svg>">
        <link rel="stylesheet" href="css/indexStyles.css">
    </head>
    
    <body>
        <div class="lunas-background">
            <div class="luna luna-1"></div>
            <div class="luna luna-2"></div>
            <div class="luna luna-3"></div>
        </div>
        
        <div class="login-container">
            <div class="login-box">
                <h2>L.U.N.A.</h2>
                <p id="subtitulo" class="subtitle">Identificación requerida para ingresar</p>

                <form id="loginForm">
                    <div class="input-group" id="grupo-usuario">
                        <input type="text" id="nombre" required placeholder=" ">
                        <label>Nombre de Usuario</label>
                    </div>

                    <div class="input-group hidden" id="grupo-pin">
                        <input type="password" id="pin" placeholder=" " maxlength="6">
                        <label>PIN de Acceso</label>
                    </div>

                    <button type="submit" id="btn-sync">CONTINUAR</button>
                </form>

                <p id="mensaje-error" class="error-msg"></p>
            </div>
        </div>

        <div id="custom-modal" class="modal-overlay hidden">
            <div class="modal-box">
                <div class="modal-icon">🚫</div>
                <h3>ACCESO DENEGADO</h3>
                <p>No eres la dueña de este sistema. Redirigiendo a un lugar seguro...</p>
                <div class="loading-bar"><div class="progress"></div></div>
            </div>
        </div>

        <div id="success-modal" class="modal-overlay hidden">
            <div class="modal-box success-box">
                <div class="modal-icon heartbeat">💖</div>
                <h3>SISTEMA ACCEDIDO</h3>
                <p>¡Lo lograste, bb :3!<br>Sabía que podrías; después de todo, eres el amor de mi vida XP</p>
                <div class="loading-bar"><div class="progress success-progress"></div></div>
            </div>
        </div>

        <script src="js/login.js"></script>
    </body>
</html>
